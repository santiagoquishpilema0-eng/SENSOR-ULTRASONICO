<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>📡 Smart Distance Monitor</title>

<link rel="stylesheet" href="style.css">

<!-- Fuente pro -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<div class="app">

  <header>
    <h1>📡 Smart Distance Monitor</h1>
    <span id="estado" class="estado">Conectando...</span>
  </header>

  <main>

    <!-- Medidor -->
    <section class="card center">
      <div id="txt-dist" class="distancia">-- cm</div>
      <div class="sub">Distancia actual</div>
    </section>

    <!-- Radar -->
    <section class="card radar-card">
      <div class="radar">
        <div class="onda"></div>
        <div class="onda delay"></div>
        <div class="centro"></div>
      </div>
    </section>

    <!-- Barra -->
    <section class="card">
      <div class="barra">
        <div id="nivel"></div>
      </div>
    </section>

    <!-- Carro -->
    <section class="card pista">
      <div id="carro">🚗</div>
    </section>

    <!-- Gráfica -->
    <section class="card">
      <canvas id="grafica"></canvas>
    </section>

  </main>

  <footer>
    <span>IoT • Tiempo real</span>
  </footer>

</div>

<script src="script.js"></script>

</body>
</html>
